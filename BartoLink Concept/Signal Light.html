<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BartoLink — Signal Light</title>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    .stage {
      min-height: 100%; padding: 40px 24px;
      display: flex; flex-wrap: wrap; gap: 32px; justify-content: center;
      background: radial-gradient(120% 80% at 50% 0%, #1f2128 0%, #0f1014 70%);
    }
    .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .col-label {
      font-size: 13px; color: #8a8e98; letter-spacing: 0.04em;
      font-weight: 500;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="variant-signal-light.jsx"></script>

  <script type="text/babel">
    function Phone({ children, time = '6:42' }) {
      return (
        <IOSDevice dark={false} width={402} height={874}>
          <IOSStatusBar dark={false} time={time} />
          <div style={{ position: 'absolute', top: 62, left: 0, right: 0, bottom: 0 }}>
            {children}
          </div>
        </IOSDevice>
      );
    }
    function App() {
      return (
        <div className="stage">
          <div className="col"><Phone><SlInbox /></Phone><div className="col-label">Inbox</div></div>
          <div className="col"><Phone><SlDetail /></Phone><div className="col-label">Notification Detail</div></div>
          <div className="col"><Phone><SlStatus /></Phone><div className="col-label">Status</div></div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
